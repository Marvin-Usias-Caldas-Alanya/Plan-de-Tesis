# SonarQube / SonarCloud — suplementos-app (React + Vite)
# No incluir tokens ni claves en este archivo. Usar variables de entorno (ver docs/SONAR_ANALISIS.md).

sonar.projectKey=suplementos-app
sonar.projectName=Suplementos App - NutriStore
sonar.projectVersion=0.1.0

sonar.sources=src
sonar.tests=src/tests
sonar.sourceEncoding=UTF-8

# JavaScript / JSX (React)
sonar.language=js

# Código fuente excluido del análisis estático
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.config.js,\
  **/*.config.mjs,\
  **/vite.config.js,\
  **/vitest.config.js,\
  **/eslint.config.js,\
  **/postcss.config.js,\
  **/src/tests/**,\
  **/*.test.js,\
  **/*.test.jsx,\
  **/src/tests/helpers/**,\
  **/*Mock*.js,\
  **/*Mock*.jsx,\
  **/*mock*.js,\
  **/*mock*.jsx,\
  **/mockData.js,\
  **/supabaseMock.js,\
  **/supabase/**

# Archivos de prueba reconocidos por Sonar
sonar.test.inclusions=**/*.test.js,**/*.test.jsx

# Cobertura importada desde Vitest (v8 + lcov)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# SonarCloud (opcional): configurar en CLI o variables de entorno, no en el repositorio
# sonar.host.url=https://sonarcloud.io
# sonar.organization=<tu-organizacion>
